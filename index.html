<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/c7d074c009.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="assets/css/style.css" />
    <title>Link Fragances</title>
  </head>
  <body>
    <aside>
      <div class="brand">
        <i class="fa-solid fa-spray-can-sparkles"></i>
        <h1>Link Parfums</h1>
      </div>
      <button class="burger" id="burgerBtn" aria-label="Abrir menú">
        <i class="fa-solid fa-bars"></i>
      </button>

      <menu id="mobileMenu">
        <p>Inicio</p>
        <p>Catalogo</p>
        <p>Ofertas</p>
        <p>Contacto</p>
      </menu>
    </aside>
    <main>
  <section class="carousel">
    <div class="carousel-track" id="carouselTrack">
      <img src="assets/img/perfume1.jpg" alt="Perfume 1" class="carousel-slide" />
      <img src="assets/img/perfume2.jpg" alt="Perfume 2" class="carousel-slide" />
      <img src="assets/img/perfume3.jpg" alt="Perfume 3" class="carousel-slide" />
    </div>

    <button class="carousel-btn prev" id="prevBtn">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <button class="carousel-btn next" id="nextBtn">
      <i class="fa-solid fa-chevron-right"></i>
    </button>
  </section>
</main>
    <footer>
      <div>
        <i class="fa-brands fa-facebook"></i>
        <i class="fa-brands fa-instagram"></i>
      </div>
      <p>
        Todos los derechos reservados  
    </p>
    </footer>
    <script>
      const burgerBtn = document.getElementById("burgerBtn");
      const mobileMenu = document.getElementById("mobileMenu");

      burgerBtn.addEventListener("click", () => {
        mobileMenu.classList.toggle("show");
      });
    </script>
  </body>
</html>
